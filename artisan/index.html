<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queen Bee Artisan Market – My Sales</title>
  <style>
    :root {
      --honey: #F4A900;
      --honey-light: #FFF8E7;
      --honey-dark: #C47F00;
      --green: #2E7D32;
      --green-light: #E8F5E9;
      --text: #1A1A1A;
      --muted: #666;
      --border: #E0E0E0;
      --white: #FFFFFF;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--honey-light); color: var(--text); min-height: 100vh; }
    header { background: var(--white); border-bottom: 3px solid var(--honey); padding: 18px 32px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); }
    .bee-icon { font-size: 2rem; }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    header p { font-size: 0.85rem; color: var(--muted); }
    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    .state-card { background: var(--white); border-radius: 12px; padding: 48px; text-align: center; box-shadow: var(--shadow); }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--honey); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .artisan-header { margin-bottom: 24px; }
    .artisan-header h2 { font-size: 1.7rem; font-weight: 700; }
    .artisan-header .month-label { color: var(--muted); font-size: 0.95rem; margin-top: 4px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border-radius: 12px; padding: 20px 24px; box-shadow: var(--shadow); border-top: 4px solid var(--honey); }
    .stat-card.payout { border-top-color: var(--green); }
    .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: 1.9rem; font-weight: 700; color: var(--text); }
    .stat-card.payout .stat-value { color: var(--green); }
    .tier-card { background: var(--white); border-radius: 12px; padding: 20px 24px; box-shadow: var(--shadow); margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
